<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSE160 Assignment 4 - Phong Lighting World</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <canvas id="webgl" width="960" height="640" aria-label="WebGL Phong lighting voxel world"></canvas>
    <div class="hud">
      <strong>Phong Lighting World</strong>
      <span id="status">Inspect the lit cube world, spheres, moving point light, spotlight, and OBJ head model.</span>
      <span>WASD move · Q/E turn · mouse look · C free roam · Space/Shift up/down · F add · R delete · T reset</span>
      <div class="controls" aria-label="Lighting controls">
        <button id="toggleLighting" type="button">Lighting: On</button>
        <button id="toggleNormals" type="button">Normals: Off</button>
        <button id="togglePoint" type="button">Point: On</button>
        <button id="toggleSpot" type="button">Spot: On</button>
        <label>Light X <input id="lightX" type="range" min="4" max="28" step="0.1" value="16"></label>
        <label class="inline"><input id="autoLight" type="checkbox" checked> Auto spin</label>
        <label>Light R <input id="lightR" type="range" min="0" max="255" step="1" value="255"></label>
        <label>Light G <input id="lightG" type="range" min="0" max="255" step="1" value="235"></label>
        <label>Light B <input id="lightB" type="range" min="0" max="255" step="1" value="184"></label>
      </div>
    </div>
    <div id="message" class="message"></div>
    <script src="lib/math.js"></script>
    <script src="camera.js"></script>
    <script src="main.js"></script>
  </body>
</html>
