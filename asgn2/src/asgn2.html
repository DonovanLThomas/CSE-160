<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8 " />
        <title>Asgn1 Draw</title>
    </head>

    <body onload="main()">
        <canvas id="webgl" width="400" height="400">
            Use a browser that supports canvas
        </canvas>

        <button id="animationOnButton">Animation On</button>
<button id="animationOffButton">Animation Off</button>


        <label for="xRotationSlide">X Rotation</label>
<input type="range" min="-45" max="45" value="0" id="xRotationSlide">
        <br>
        <label for="yRotationSlide">Y Rotation</label>
<input type="range" min="-180" max="180" value="0" id="yRotationSlide">
        <br>
        <label for="frontNearUpperLegSlide">Front Near Upper Leg</label>
<input type="range" min="-45" max="45" value="0" id="frontNearUpperLegSlide">
        <br>
        <label for="frontNearLowerLegSlide">Front Near Lower Leg</label>
<input type="range" min="-45" max="45" value="0" id="frontNearLowerLegSlide">
        <br>
        <label for="frontNearFootSlide">Front Near Foot</label>
<input type="range" min="-45" max="45" value="0" id="frontNearFootSlide">
        <br>
        <label for="tailBaseSlide">Tail Base</label>
<input type="range" min="-45" max="45" value="0" id="tailBaseSlide">
        <br>
        <label for="tailMiddleSlide">Tail Middle</label>
<input type="range" min="-45" max="45" value="0" id="tailMiddleSlide">
        <br>
        <label for="tailTipSlide">Tail Tip</label>
<input type="range" min="-45" max="45" value="0" id="tailTipSlide">

<p2>Did you know Elephants are the only Land Animal that can't jump? Shift Click to defy physics!</p2>
       

       

        <script src="../lib/webgl-utils.js"></script>
        <script src="../lib/webgl-debug.js"></script>
        <script src="../lib/cuon-utils.js"></script>
        <script src="../lib/cuon-matrix-cse160.js"></script>
        <script src="point.js"></script>
        <script src="triangle.js"></script>
        <script src="circle.js"></script>
        <script src="cube.js"></script>
        <script src="cylinder.js"></script>
        <script src="asgn2.js"></script>


    </body>
</html>
